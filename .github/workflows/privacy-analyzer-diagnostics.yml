name: Privacy Analyzer Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  analyzer-diagnostics:
    if: github.head_ref == 'agent/privacy-center-data-deletion'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Capture analyzer output
        shell: bash
        run: |
          set +e
          flutter analyze 2>&1 | tee privacy-analyzer-output.txt
          status=${PIPESTATUS[0]}
          echo "$status" > privacy-analyzer-status.txt
          exit 0

      - name: Upload analyzer diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: privacy-analyzer-diagnostics
          path: |
            privacy-analyzer-output.txt
            privacy-analyzer-status.txt
          if-no-files-found: error
          retention-days: 1
