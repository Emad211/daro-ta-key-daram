name: Step 6 Formatter Export

on:
  pull_request:

permissions:
  contents: read

jobs:
  format-export:
    if: github.head_ref == 'agent/error-recovery-flows'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Apply canonical formatting
        run: dart format lib test

      - name: Verify formatted diff
        run: git diff --check

      - name: Package canonical files
        run: |
          git diff --name-only --diff-filter=ACM > /tmp/formatted-files.txt
          test -s /tmp/formatted-files.txt
          tar -czf step6-formatted-source.tar.gz -T /tmp/formatted-files.txt
          cp /tmp/formatted-files.txt formatted-files.txt

      - name: Upload canonical formatter output
        uses: actions/upload-artifact@v4
        with:
          name: step6-formatted-source
          path: |
            step6-formatted-source.tar.gz
            formatted-files.txt
          if-no-files-found: error
          retention-days: 1
