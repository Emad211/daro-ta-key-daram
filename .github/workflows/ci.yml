name: Step 6 Formatter Finalizer

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize-formatting:
    if: github.head_ref == 'agent/error-recovery-flows'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reconstruct and verify formatter payload
        run: |
          cat .step6format/chunk-* | base64 --decode > /tmp/step6-format-payload.tar.gz
          echo '5a5774489b5f31fe121dafeb0a076175e1011a82452a2b157a9967259bdfd809  /tmp/step6-format-payload.tar.gz' | sha256sum --check --strict

      - name: Apply canonical formatter output
        run: |
          tar -xzf /tmp/step6-format-payload.tar.gz -C .
          rm -rf .step6format
          git diff --check

      - name: Commit canonical formatting
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style: apply canonical step 6 formatting'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
