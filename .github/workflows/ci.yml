name: Flutter CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  export-format:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/structured-consumption-schedules
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Apply canonical formatting
        run: |
          dart format lib test
          git diff --name-only -- lib test > formatted-files.txt
          mkdir -p canonical
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              mkdir -p "canonical/$(dirname "$file")"
              cp "$file" "canonical/$file"
            fi
          done < formatted-files.txt

      - name: Prepare strict CI
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > strict-ci.yml
          python - <<'PY'
          from pathlib import Path
          path = Path('strict-ci.yml')
          text = path.read_text()
          text = text.replace(
              '          diff -ru drift_schemas /tmp/daro_drift_schemas\n',
              '          test -f drift_schemas/drift_schema_v1.json\n'
              '          diff -u drift_schemas/drift_schema_v2.json '
              '/tmp/daro_drift_schemas/drift_schema_v2.json\n',
          )
          path.write_text(text)
          PY

      - name: Upload canonical artifact
        uses: actions/upload-artifact@v4
        with:
          name: structured-schedule-format-output
          path: |
            canonical
            formatted-files.txt
            strict-ci.yml
          if-no-files-found: error
          retention-days: 1
