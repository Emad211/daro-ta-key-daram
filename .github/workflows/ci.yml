name: Flutter CI

on:
  push:
    branches: [main, agent/structured-consumption-schedules]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export branch snapshot
        if: github.head_ref == 'agent/structured-consumption-schedules' || github.ref == 'refs/heads/agent/structured-consumption-schedules'
        run: |
          tar --exclude=.git --exclude=.dart_tool --exclude=build \
            --exclude=source-snapshot.tar.gz \
            -czf source-snapshot.tar.gz .

      - name: Upload branch snapshot
        if: github.head_ref == 'agent/structured-consumption-schedules' || github.ref == 'refs/heads/agent/structured-consumption-schedules'
        uses: actions/upload-artifact@v4
        with:
          name: structured-schedule-source-snapshot
          path: source-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Verify committed Android platform
        run: test -f android/app/build.gradle.kts

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify Drift schema snapshot
        run: |
          rm -rf /tmp/daro_drift_schemas
          bash tool/export_drift_schema.sh /tmp/daro_drift_schemas
          diff -ru drift_schemas /tmp/daro_drift_schemas

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --coverage

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: daro-ta-key-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7
