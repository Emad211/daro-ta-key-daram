name: Agent Sync Performance Jalali

on:
  push:
    branches: [agent/performance-size-jalali-dates]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/performance-size-jalali-dates

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Migrate remaining details dates to Jalali
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('lib/features/medication_inventory/presentation/screens/medication_details_screen.dart')
          text = path.read_text(encoding='utf-8')

          marker = "import 'package:go_router/go_router.dart';\n"
          date_import = "\nimport '../../../../core/date/persian_date_formatter.dart';\n"
          if "persian_date_formatter.dart" not in text:
              if marker not in text:
                  raise SystemExit('Unable to locate details-screen import marker')
              text = text.replace(marker, marker + date_import, 1)

          text = text.replace(
              '_date(snapshot.depletionAt)',
              'PersianDateFormatter.date(snapshot.depletionAt)',
          )
          text = text.replace(
              '_dateTime(event.effectiveAt)',
              'PersianDateFormatter.dateTime(event.effectiveAt)',
          )

          text, date_count = re.subn(
              r"\nString _date\(DateTime value\) \{.*?\n\}\n\nString _dateTime\(DateTime value\) \{.*?\n\}\n",
              '\n',
              text,
              count=1,
              flags=re.DOTALL,
          )
          if date_count != 1:
              raise SystemExit(f'Expected to remove one Gregorian date helper block, removed {date_count}')
          if '_date(' in text or '_dateTime(' in text:
              raise SystemExit('A private Gregorian date helper still remains')

          path.write_text(text, encoding='utf-8')

      - name: Resolve dependencies and format
        run: |
          flutter pub get
          dart format lib test

      - name: Verify no known Gregorian UI formatter remains
        shell: bash
        run: |
          set -euo pipefail
          ! grep -R "value.year.*value.month\|date.year.*date.month" lib/features/medication_inventory/presentation

      - name: Commit synchronized files and remove this workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/agent-sync-performance-jalali.yml
          git add pubspec.lock lib test
          git commit -m "Sync Jalali dependency and canonical formatting"
          git push origin HEAD:agent/performance-size-jalali-dates
