name: Accessibility Flow Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  accessibility-flow-diagnostics:
    if: github.head_ref == 'agent/accessibility-rtl-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Capture targeted accessibility flow output
        shell: bash
        run: |
          set +e
          flutter test test/features/medication_inventory/presentation/accessibility_rtl_widget_test.dart --reporter expanded 2>&1 | tee accessibility-flow-output.txt
          status=${PIPESTATUS[0]}
          echo "$status" > accessibility-flow-status.txt
          exit 0

      - name: Upload targeted flow diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-flow-diagnostics
          path: |
            accessibility-flow-output.txt
            accessibility-flow-status.txt
          if-no-files-found: error
          retention-days: 1
