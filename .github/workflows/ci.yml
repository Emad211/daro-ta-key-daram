name: Accessibility Baseline Formatter

on:
  pull_request:

permissions:
  contents: write

jobs:
  format-baseline:
    if: github.head_ref == 'agent/accessibility-rtl-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Apply canonical formatting
        run: dart format test/features/medication_inventory/presentation/accessibility_rtl_widget_test.dart

      - name: Restore strict CI
        run: |
          cat > .github/workflows/ci.yml <<'YAML'
          name: Flutter CI

          on:
            push:
              branches: [main]
            pull_request:

          permissions:
            contents: read

          jobs:
            validate:
              runs-on: ubuntu-latest
              timeout-minutes: 35

              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Set up Flutter
                  uses: subosito/flutter-action@v2
                  with:
                    flutter-version: 3.44.6
                    channel: stable
                    cache: true

                - name: Verify committed Android platform
                  run: test -f android/app/build.gradle.kts

                - name: Install dependencies
                  run: flutter pub get

                - name: Generate Drift code
                  run: dart run build_runner build --delete-conflicting-outputs

                - name: Verify Drift schema snapshot
                  run: |
                    rm -rf /tmp/daro_drift_schemas
                    bash tool/export_drift_schema.sh /tmp/daro_drift_schemas
                    test -f drift_schemas/drift_schema_v1.json
                    diff -u drift_schemas/drift_schema_v2.json /tmp/daro_drift_schemas/drift_schema_v2.json

                - name: Verify formatting
                  run: dart format --output=none --set-exit-if-changed lib test

                - name: Analyze
                  run: flutter analyze

                - name: Test
                  run: flutter test --coverage

                - name: Build debug APK
                  run: flutter build apk --debug

                - name: Upload debug APK
                  uses: actions/upload-artifact@v4
                  with:
                    name: daro-ta-key-debug-apk
                    path: build/app/outputs/flutter-apk/app-debug.apk
                    if-no-files-found: error
                    retention-days: 7
          YAML

      - name: Commit canonical test formatting
        run: |
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style: format accessibility baseline test'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
