name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Verify committed Android platform
        run: test -f android/app/build.gradle.kts

      - name: Verify signing material, scripts, and release contract
        shell: bash
        run: |
          set -euo pipefail
          tracked="$(git ls-files \
            'android/key.properties' \
            '*.jks' \
            '*.keystore' \
            '*.p12' \
            '*.pfx' \
            '*.pem' \
            '*.der')"
          test -z "$tracked"
          git check-ignore --no-index android/key.properties android/upload-keystore.jks
          ! grep -F 'signingConfigs.getByName("debug")' android/app/build.gradle.kts
          bash -n tool/bootstrap.sh
          bash -n tool/export_drift_schema.sh
          bash -n tool/build_signed_android_release.sh
          grep -F 'flutter build apk' .github/workflows/android-release.yml
          grep -F -- '--split-per-abi' .github/workflows/android-release.yml
          grep -F 'flutter build appbundle' .github/workflows/android-release.yml
          grep -F 'apksigner' .github/workflows/android-release.yml
          grep -F 'INSTALL-APK-FA.txt' .github/workflows/android-release.yml

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify Drift schema snapshot
        run: |
          rm -rf /tmp/daro_drift_schemas
          bash tool/export_drift_schema.sh /tmp/daro_drift_schemas
          test -f drift_schemas/drift_schema_v1.json
          diff -u drift_schemas/drift_schema_v2.json /tmp/daro_drift_schemas/drift_schema_v2.json

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --coverage

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Verify release refuses missing signing material
        shell: bash
        run: |
          set -euo pipefail
          rm -f android/key.properties android/ci-upload-keystore.jks

          set +e
          (cd android && ./gradlew :app:verifyReleaseSigning) > /tmp/release-signing-guard.log 2>&1
          status=$?
          set -e

          cat /tmp/release-signing-guard.log
          test "$status" -ne 0
          grep -F 'Release signing is not configured.' /tmp/release-signing-guard.log

      - name: Generate ephemeral CI upload keystore
        shell: bash
        run: |
          set -euo pipefail
          password="$(openssl rand -hex 24)"
          echo "::add-mask::$password"

          keytool -genkeypair \
            -keystore android/ci-upload-keystore.jks \
            -storetype JKS \
            -storepass "$password" \
            -keypass "$password" \
            -alias ci-upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname 'CN=Daro Ta Key CI, OU=Release Validation, O=CI, C=IR' \
            -noprompt

          cat > android/key.properties <<EOF
          storePassword=$password
          keyPassword=$password
          keyAlias=ci-upload
          storeFile=ci-upload-keystore.jks
          EOF
          chmod 600 android/key.properties android/ci-upload-keystore.jks

          {
            echo "ANDROID_UPLOAD_STORE_PASSWORD=$password"
            echo "ANDROID_UPLOAD_KEY_PASSWORD=$password"
            echo 'ANDROID_UPLOAD_KEY_ALIAS=ci-upload'
            echo 'ANDROID_UPLOAD_STORE_FILE=ci-upload-keystore.jks'
          } >> "$GITHUB_ENV"

      - name: Verify local key.properties signing
        run: cd android && ./gradlew :app:verifyReleaseSigning

      - name: Switch to environment-backed signing
        shell: bash
        run: |
          set -euo pipefail
          rm -f android/key.properties
          (cd android && ./gradlew --stop)

      - name: Verify environment-backed release signing
        run: cd android && ./gradlew :app:verifyReleaseSigning

      - name: Build ephemeral universal, arm64, and AAB releases
        shell: bash
        run: |
          set -euo pipefail
          output=build/app/outputs/release-validation
          mkdir -p "$output"

          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk \
            "$output/daro-ta-key-universal-release.apk"

          flutter build apk --release --split-per-abi
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "$output/daro-ta-key-arm64-release.apk"

          flutter build appbundle --release
          cp build/app/outputs/bundle/release/app-release.aab \
            "$output/daro-ta-key-release.aab"

      - name: Verify signatures and record measured release sizes
        shell: bash
        run: |
          set -euo pipefail
          output=build/app/outputs/release-validation
          universal="$output/daro-ta-key-universal-release.apk"
          arm64="$output/daro-ta-key-arm64-release.apk"
          bundle="$output/daro-ta-key-release.aab"
          test -f "$universal"
          test -f "$arm64"
          test -f "$bundle"

          apksigner="$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -n "$apksigner"
          test -x "$apksigner"

          "$apksigner" verify --verbose --print-certs "$universal" | tee /tmp/universal-apk-signature.log
          "$apksigner" verify --verbose --print-certs "$arm64" | tee /tmp/arm64-apk-signature.log
          grep -Eq 'Verified using v2 scheme.*: true|Verified using v3 scheme.*: true' /tmp/universal-apk-signature.log
          grep -Eq 'Verified using v2 scheme.*: true|Verified using v3 scheme.*: true' /tmp/arm64-apk-signature.log

          jarsigner -verify -verbose -certs "$bundle" | tee /tmp/aab-signature.log
          grep -F 'jar verified.' /tmp/aab-signature.log

          sha256sum "$universal" > "$universal.sha256"
          sha256sum "$arm64" > "$arm64.sha256"
          sha256sum "$bundle" > "$bundle.sha256"

          universal_bytes="$(stat -c%s "$universal")"
          arm64_bytes="$(stat -c%s "$arm64")"
          bundle_bytes="$(stat -c%s "$bundle")"
          universal_limit=$((60 * 1024 * 1024))
          arm64_limit=$((30 * 1024 * 1024))

          cat > "$output/BUILD-METADATA.txt" <<EOF
          Product: Daro Ta Key Daram
          Application ID: ir.emadkarimi.darutakey
          Commit: $GITHUB_SHA
          Workflow run: $GITHUB_RUN_NUMBER
          Signing identity: disposable CI validation key
          Universal APK bytes: $universal_bytes
          Arm64 APK bytes: $arm64_bytes
          AAB bytes: $bundle_bytes
          Universal APK baseline limit bytes: $universal_limit
          Arm64 APK baseline limit bytes: $arm64_limit
          Performance conclusion: use release/profile on a physical device; debug is excluded
          Store/upload continuity: NOT ESTABLISHED by this disposable-key artifact
          EOF

          {
            echo '## Android release size evidence'
            echo
            echo '| Artifact | Bytes | MiB | Baseline limit |'
            echo '|---|---:|---:|---:|'
            awk -v bytes="$universal_bytes" -v limit="$universal_limit" 'BEGIN {printf "| Universal APK | %d | %.2f | %.2f MiB |\n", bytes, bytes/1048576, limit/1048576}'
            awk -v bytes="$arm64_bytes" -v limit="$arm64_limit" 'BEGIN {printf "| Arm64 APK | %d | %.2f | %.2f MiB |\n", bytes, bytes/1048576, limit/1048576}'
            awk -v bytes="$bundle_bytes" 'BEGIN {printf "| AAB | %d | %.2f | n/a |\n", bytes, bytes/1048576}'
          } >> "$GITHUB_STEP_SUMMARY"

          printf 'Universal APK: %s bytes\n' "$universal_bytes"
          printf 'Arm64 APK: %s bytes\n' "$arm64_bytes"
          printf 'AAB: %s bytes\n' "$bundle_bytes"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: daro-ta-key-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload measured CI release validation
        uses: actions/upload-artifact@v4
        with:
          name: daro-ta-key-ci-release-validation
          path: build/app/outputs/release-validation/
          if-no-files-found: error
          retention-days: 7

      - name: Enforce release size baseline budgets
        shell: bash
        run: |
          set -euo pipefail
          output=build/app/outputs/release-validation
          universal_bytes="$(stat -c%s "$output/daro-ta-key-universal-release.apk")"
          arm64_bytes="$(stat -c%s "$output/daro-ta-key-arm64-release.apk")"
          universal_limit=$((60 * 1024 * 1024))
          arm64_limit=$((30 * 1024 * 1024))
          test "$universal_bytes" -le "$universal_limit"
          test "$arm64_bytes" -le "$arm64_limit"

      - name: Remove ephemeral signing material
        if: always()
        run: rm -f android/key.properties android/ci-upload-keystore.jks
