name: Flutter CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/lifecycle-state-machine
          fetch-depth: 0

      - name: Export branch snapshot
        run: git archive --format=tar.gz --output=lifecycle-source.tar.gz HEAD

      - name: Upload branch snapshot
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-source-snapshot
          path: lifecycle-source.tar.gz
          if-no-files-found: error
          retention-days: 1
