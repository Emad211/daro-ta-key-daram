name: Patch medication management navigation

on:
  push:
    branches: [agent/medication-edit-archive-management]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/medication-edit-archive-management
          fetch-depth: 0

      - name: Apply focused navigation patches
        shell: python
        run: |
          from pathlib import Path

          details_path = Path('lib/features/medication_inventory/presentation/screens/medication_details_screen.dart')
          details = details_path.read_text(encoding='utf-8')
          old_actions = """        actions: <Widget>[
          IconButton(
            tooltip: 'آرشیو دارو',
            onPressed: () => _archive(context, ref),
            icon: const Icon(Icons.archive_outlined),
          ),
        ],"""
          new_actions = """        actions: <Widget>[
          IconButton(
            tooltip: 'ویرایش مشخصات',
            onPressed: () => context.goNamed(
              'edit-medication',
              pathParameters: <String, String>{
                'medicationId': medication.id,
              },
            ),
            icon: const Icon(Icons.edit_outlined),
          ),
          IconButton(
            tooltip: 'آرشیو دارو',
            onPressed: () => _archive(context, ref),
            icon: const Icon(Icons.archive_outlined),
          ),
        ],"""
          if old_actions not in details:
              raise SystemExit('Medication details action block not found')
          details = details.replace(old_actions, new_actions, 1)
          old_invalidation = """      ref.invalidate(activeMedicationsProvider);
      ref.invalidate(medicationByIdProvider(medication.id));"""
          new_invalidation = """      ref.invalidate(activeMedicationsProvider);
      ref.invalidate(archivedMedicationsProvider);
      ref.invalidate(medicationByIdProvider(medication.id));"""
          if old_invalidation not in details:
              raise SystemExit('Medication details invalidation block not found')
          details = details.replace(old_invalidation, new_invalidation, 1)
          details_path.write_text(details, encoding='utf-8')

          list_path = Path('lib/features/medication_inventory/presentation/screens/medication_list_screen.dart')
          listing = list_path.read_text(encoding='utf-8')
          old_list_actions = """        actions: <Widget>[
          IconButton(
            tooltip: 'فعال‌کردن یادآوری موجودی',"""
          new_list_actions = """        actions: <Widget>[
          IconButton(
            tooltip: 'مدیریت آرشیو',
            onPressed: () => context.goNamed('archived-medications'),
            icon: const Icon(Icons.archive_outlined),
          ),
          IconButton(
            tooltip: 'فعال‌کردن یادآوری موجودی',"""
          if old_list_actions not in listing:
              raise SystemExit('Medication list action block not found')
          listing = listing.replace(old_list_actions, new_list_actions, 1)
          list_path.write_text(listing, encoding='utf-8')

      - name: Format patched files
        run: dart format lib/features/medication_inventory/presentation/screens

      - name: Commit focused patches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/medication_inventory/presentation/screens
          git commit -m "feat: link medication edit and archive management"
          git push origin HEAD:agent/medication-edit-archive-management
