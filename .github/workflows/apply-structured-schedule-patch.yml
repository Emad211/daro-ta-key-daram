name: Apply structured schedule patch

on:
  push:
    branches: [agent/structured-consumption-schedules]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/structured-consumption-schedules
          fetch-depth: 0

      - name: Rebuild and verify patch
        shell: bash
        run: |
          cat .bootstrap/xz-* > /tmp/patch.b64
          base64 --decode /tmp/patch.b64 > /tmp/structured-schedule-patch.tar.xz
          echo "7d8cf421daa02610904bba7458ce5f3fb30c72273eb7f1a1ab11b8136fd10365  /tmp/structured-schedule-patch.tar.xz" | sha256sum --check -

      - name: Apply source patch
        shell: bash
        run: |
          tar -xJf /tmp/structured-schedule-patch.tar.xz -C "$GITHUB_WORKSPACE"
          rm -rf .bootstrap
          rm -f .github/workflows/apply-structured-schedule-patch.yml
          rm -f .github/workflows/export-source-snapshot.yml

      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat: add structured consumption schedules"
          git push origin HEAD:agent/structured-consumption-schedules
