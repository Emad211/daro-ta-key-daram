name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Verify committed Android platform
        run: test -f android/app/build.gradle.kts

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Export Drift schema
        run: |
          rm -rf /tmp/daro_drift_schemas
          bash tool/export_drift_schema.sh /tmp/daro_drift_schemas

      - name: Upload generated schema
        uses: actions/upload-artifact@v4
        with:
          name: structured-schedule-drift-schema
          path: /tmp/daro_drift_schemas
          if-no-files-found: error
          retention-days: 1

      - name: Apply canonical formatting
        run: dart format lib test

      - name: Upload canonical Dart sources
        uses: actions/upload-artifact@v4
        with:
          name: structured-schedule-canonical-sources
          path: |
            lib
            test
          if-no-files-found: error
          retention-days: 1

      - name: Capture analyzer diagnostics
        id: analyze
        continue-on-error: true
        run: |
          set +e
          flutter analyze > analyzer-output.txt 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          cat analyzer-output.txt
          exit $status

      - name: Capture test diagnostics
        id: tests
        continue-on-error: true
        run: |
          set +e
          flutter test --coverage --reporter expanded > test-output.txt 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          cat test-output.txt
          exit $status

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: structured-schedule-diagnostics
          path: |
            analyzer-output.txt
            test-output.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce diagnostics
        if: steps.analyze.outputs.exit_code != '0' || steps.tests.outputs.exit_code != '0'
        run: exit 1

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: daro-ta-key-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7
