name: Flutter CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/lifecycle-state-machine
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Apply lifecycle patches
        run: |
          for patch_file in \
            .step5/01-drift-lifecycle.patch \
            .step5/02-edit-guard.patch \
            .step5/03-details-guard.patch
          do
            echo "Checking ${patch_file}"
            git apply --check "${patch_file}"
            git apply --verbose "${patch_file}"
          done

      - name: Restore strict CI and remove staging files
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -rf .step5

      - name: Install dependencies and format
        run: |
          flutter pub get
          dart format lib test

      - name: Commit finalized lifecycle state machine
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat: finalize lifecycle state machine"
          git push origin HEAD:agent/lifecycle-state-machine
