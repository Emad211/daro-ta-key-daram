name: Generate Android project

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/android-local-notifications
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Generate Android project
        run: |
          flutter create \
            --no-pub \
            --platforms=android \
            --org ir.emadkarimi \
            --project-name daro_ta_key_daram \
            .

      - name: Commit generated Android project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android
          if git diff --cached --quiet; then
            echo "Android project already exists."
            exit 0
          fi
          git commit -m "chore: commit generated Android project"
          git push origin HEAD:agent/android-local-notifications
