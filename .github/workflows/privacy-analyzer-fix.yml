name: Privacy Analyzer Fix Apply

on:
  push:
    branches:
      - agent/privacy-center-data-deletion

permissions:
  contents: write

jobs:
  apply-analyzer-fixes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/privacy-center-data-deletion
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Apply analyzer fixes
        run: python3 tool/fix_privacy_analyzer.py

      - name: Format changed tests
        run: |
          dart format \
            test/features/medication_inventory/presentation/error_recovery_widget_test.dart \
            test/features/privacy/presentation/privacy_center_widget_test.dart

      - name: Remove diagnostic and staging files
        run: |
          rm -f tool/fix_privacy_analyzer.py
          rm -f .github/workflows/privacy-analyzer-diagnostics.yml
          rm -f .github/workflows/privacy-analyzer-fix.yml

      - name: Commit analyzer fixes
        run: |
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: satisfy privacy deletion repository contracts'
          git push origin HEAD:agent/privacy-center-data-deletion
