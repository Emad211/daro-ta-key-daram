name: Android Signed Release

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: Optional semantic version override, for example 0.1.0
        required: false
        type: string
      build_number:
        description: Optional positive Android version code override
        required: false
        type: string

permissions:
  contents: read

jobs:
  signed-android:
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Validate release inputs and secrets
        shell: bash
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          RELEASE_BUILD_NAME: ${{ inputs.build_name }}
          RELEASE_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail

          missing=()
          [[ -n "$ANDROID_UPLOAD_KEYSTORE_BASE64" ]] || missing+=(ANDROID_UPLOAD_KEYSTORE_BASE64)
          [[ -n "$ANDROID_UPLOAD_STORE_PASSWORD" ]] || missing+=(ANDROID_UPLOAD_STORE_PASSWORD)
          [[ -n "$ANDROID_UPLOAD_KEY_ALIAS" ]] || missing+=(ANDROID_UPLOAD_KEY_ALIAS)
          [[ -n "$ANDROID_UPLOAD_KEY_PASSWORD" ]] || missing+=(ANDROID_UPLOAD_KEY_PASSWORD)

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required repository secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          if [[ -n "$RELEASE_BUILD_NAME" && ! "$RELEASE_BUILD_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo 'build_name must be a semantic version such as 0.1.0.' >&2
            exit 1
          fi

          if [[ -n "$RELEASE_BUILD_NUMBER" && ! "$RELEASE_BUILD_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo 'build_number must be a positive integer.' >&2
            exit 1
          fi

      - name: Restore and inspect upload keystore
        shell: bash
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          chmod 600 android/upload-keystore.jks

          keytool -list \
            -keystore android/upload-keystore.jks \
            -storepass "$ANDROID_UPLOAD_STORE_PASSWORD" \
            -alias "$ANDROID_UPLOAD_KEY_ALIAS" > /dev/null

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify source before release
        run: |
          dart format --output=none --set-exit-if-changed lib test
          flutter analyze
          flutter test

      - name: Verify release signing configuration
        env:
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          ANDROID_UPLOAD_STORE_FILE: upload-keystore.jks
        run: cd android && ./gradlew :app:verifyReleaseSigning

      - name: Build signed universal, arm64, and AAB releases
        shell: bash
        env:
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          ANDROID_UPLOAD_STORE_FILE: upload-keystore.jks
          RELEASE_BUILD_NAME: ${{ inputs.build_name }}
          RELEASE_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail
          args=(--release)
          output=build/app/outputs/internal-release
          mkdir -p "$output"

          [[ -z "$RELEASE_BUILD_NAME" ]] || args+=(--build-name "$RELEASE_BUILD_NAME")
          [[ -z "$RELEASE_BUILD_NUMBER" ]] || args+=(--build-number "$RELEASE_BUILD_NUMBER")

          flutter build apk "${args[@]}"
          cp build/app/outputs/flutter-apk/app-release.apk \
            "$output/daro-ta-key-universal-release.apk"

          flutter build apk "${args[@]}" --split-per-abi
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "$output/daro-ta-key-arm64-release.apk"

          flutter build appbundle "${args[@]}"
          cp build/app/outputs/bundle/release/app-release.aab \
            "$output/daro-ta-key-store-candidate.aab"

      - name: Verify signatures, sizes, checksums, and metadata
        shell: bash
        env:
          RELEASE_BUILD_NAME: ${{ inputs.build_name }}
          RELEASE_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail
          output=build/app/outputs/internal-release
          universal="$output/daro-ta-key-universal-release.apk"
          arm64="$output/daro-ta-key-arm64-release.apk"
          bundle="$output/daro-ta-key-store-candidate.aab"
          test -f "$universal"
          test -f "$arm64"
          test -f "$bundle"

          apksigner="$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -n "$apksigner"
          test -x "$apksigner"

          "$apksigner" verify --verbose --print-certs "$universal" | tee /tmp/universal-apk-signature.log
          "$apksigner" verify --verbose --print-certs "$arm64" | tee /tmp/arm64-apk-signature.log
          grep -Eq 'Verified using v2 scheme.*: true|Verified using v3 scheme.*: true' /tmp/universal-apk-signature.log
          grep -Eq 'Verified using v2 scheme.*: true|Verified using v3 scheme.*: true' /tmp/arm64-apk-signature.log

          jarsigner -verify -verbose -certs "$bundle" | tee /tmp/aab-signature.log
          grep -F 'jar verified.' /tmp/aab-signature.log

          sha256sum "$universal" > "$universal.sha256"
          sha256sum "$arm64" > "$arm64.sha256"
          sha256sum "$bundle" > "$bundle.sha256"

          universal_bytes="$(stat -c%s "$universal")"
          arm64_bytes="$(stat -c%s "$arm64")"
          bundle_bytes="$(stat -c%s "$bundle")"
          universal_limit=$((60 * 1024 * 1024))
          arm64_limit=$((30 * 1024 * 1024))
          test "$universal_bytes" -le "$universal_limit"
          test "$arm64_bytes" -le "$arm64_limit"

          pubspec_version="$(awk '/^version:/{print $2; exit}' pubspec.yaml)"
          signer_digest="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' /tmp/arm64-apk-signature.log | head -n 1)"
          cat > "$output/BUILD-METADATA.txt" <<EOF
          Product: Daro Ta Key Daram
          Application ID: ir.emadkarimi.darutakey
          Commit: $GITHUB_SHA
          Workflow run: $GITHUB_RUN_NUMBER
          Pubspec version: $pubspec_version
          Requested build name: ${RELEASE_BUILD_NAME:-not overridden}
          Requested build number: ${RELEASE_BUILD_NUMBER:-not overridden}
          APK signer certificate SHA-256: ${signer_digest:-see APK verification log}
          Universal APK bytes: $universal_bytes
          Arm64 APK bytes: $arm64_bytes
          AAB bytes: $bundle_bytes
          Recommended physical-device file: daro-ta-key-arm64-release.apk
          EOF

          cat > "$output/INSTALL-APK-FA.txt" <<'EOF'
          راهنمای نصب APK داخلی

          1. فایل artifact گیت‌هاب به‌صورت ZIP دانلود می‌شود؛ ابتدا ZIP را Extract کنید.
          2. برای بیشتر گوشی‌های جدید Android فایل daro-ta-key-arm64-release.apk را انتخاب کنید.
          3. فقط اگر معماری دستگاه نامشخص یا قدیمی است از daro-ta-key-universal-release.apk استفاده کنید.
          4. APK را به Downloads منتقل و از Files / My Files با Package Installer باز کنید.
          5. برای APK تک‌فایلی از SAI استفاده نکنید؛ SAI برای split APK/APKS است.
          6. خطای ناسازگاری امضا را دور نزنید. نسخه‌ای با کلید دیگر باید با پذیرش حذف داده محلی uninstall شود.

          فایل AAB قابل نصب مستقیم نیست و فقط برای بارگذاری در فروشگاه است.
          EOF

      - name: Upload signed Android internal release
        uses: actions/upload-artifact@v4
        with:
          name: daro-ta-key-signed-android-${{ github.run_number }}
          path: build/app/outputs/internal-release/
          if-no-files-found: error
          retention-days: 14

      - name: Remove signing material
        if: always()
        shell: bash
        run: rm -f android/key.properties android/upload-keystore.jks
