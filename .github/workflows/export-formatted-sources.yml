name: Export formatted sources

on:
  push:
    branches: [agent/medication-edit-archive-management]

permissions:
  contents: read

jobs:
  export:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Format Dart sources
        run: dart format lib test

      - name: Upload formatted sources
        uses: actions/upload-artifact@v4
        with:
          name: formatted-medication-management
          path: |
            lib
            test
          if-no-files-found: error
          retention-days: 1
