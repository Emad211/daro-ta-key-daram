name: Flutter CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/lifecycle-state-machine
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Update typed assertion
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('test/features/medication_inventory/infrastructure/drift_medication_repository_test.dart')
          text = path.read_text()
          old_import = "import 'package:daro_ta_key_daram/features/medication_inventory/application/medication_details_update.dart';"
          new_import = old_import + "\nimport 'package:daro_ta_key_daram/features/medication_inventory/application/medication_lifecycle.dart';"
          if text.count(old_import) != 1:
              raise SystemExit('Unexpected details-update import count')
          text = text.replace(old_import, new_import, 1)
          old_assertion = 'await expectLater(operation, throwsStateError);'
          new_assertion = "await expectLater(operation, throwsA(isA<MedicationNotFoundException>()));"
          if text.count(old_assertion) != 1:
              raise SystemExit('Unexpected legacy assertion count')
          path.write_text(text.replace(old_assertion, new_assertion, 1))
          PY

      - name: Restore strict CI
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml

      - name: Format and commit
        run: |
          dart format test/features/medication_inventory/infrastructure/drift_medication_repository_test.dart
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test: expect typed missing-record failure"
          git push origin HEAD:agent/lifecycle-state-machine
