name: Android Signed Release

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: Optional semantic version override, for example 0.1.0
        required: false
        type: string
      build_number:
        description: Optional positive Android version code override
        required: false
        type: string

permissions:
  contents: read

jobs:
  signed-aab:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
      ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
      ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
      ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Validate release inputs and secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          [[ -n "$ANDROID_UPLOAD_KEYSTORE_BASE64" ]] || missing+=(ANDROID_UPLOAD_KEYSTORE_BASE64)
          [[ -n "$ANDROID_UPLOAD_STORE_PASSWORD" ]] || missing+=(ANDROID_UPLOAD_STORE_PASSWORD)
          [[ -n "$ANDROID_UPLOAD_KEY_ALIAS" ]] || missing+=(ANDROID_UPLOAD_KEY_ALIAS)
          [[ -n "$ANDROID_UPLOAD_KEY_PASSWORD" ]] || missing+=(ANDROID_UPLOAD_KEY_PASSWORD)

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required repository secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          build_name='${{ inputs.build_name }}'
          build_number='${{ inputs.build_number }}'

          if [[ -n "$build_name" && ! "$build_name" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo 'build_name must be a semantic version such as 0.1.0.' >&2
            exit 1
          fi

          if [[ -n "$build_number" && ! "$build_number" =~ ^[1-9][0-9]*$ ]]; then
            echo 'build_number must be a positive integer.' >&2
            exit 1
          fi

      - name: Restore upload keystore
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          chmod 600 android/upload-keystore.jks

          cat > android/key.properties <<EOF
          storePassword=$ANDROID_UPLOAD_STORE_PASSWORD
          keyPassword=$ANDROID_UPLOAD_KEY_PASSWORD
          keyAlias=$ANDROID_UPLOAD_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          chmod 600 android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify source before release
        run: |
          dart format --output=none --set-exit-if-changed lib test
          flutter analyze
          flutter test

      - name: Verify release signing configuration
        run: cd android && ./gradlew :app:verifyReleaseSigning

      - name: Build signed release AAB
        shell: bash
        run: |
          set -euo pipefail
          args=(--release)
          build_name='${{ inputs.build_name }}'
          build_number='${{ inputs.build_number }}'

          [[ -z "$build_name" ]] || args+=(--build-name "$build_name")
          [[ -z "$build_number" ]] || args+=(--build-number "$build_number")

          flutter build appbundle "${args[@]}"

      - name: Verify signature and create checksum
        shell: bash
        run: |
          set -euo pipefail
          bundle=build/app/outputs/bundle/release/app-release.aab
          test -f "$bundle"
          jarsigner -verify -strict -certs "$bundle"
          sha256sum "$bundle" > "$bundle.sha256"

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: daro-ta-key-signed-aab-${{ github.run_number }}
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/bundle/release/app-release.aab.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Remove signing material
        if: always()
        shell: bash
        run: rm -f android/key.properties android/upload-keystore.jks
