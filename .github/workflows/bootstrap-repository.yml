name: Bootstrap repository

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore engineered Phase 1 repository
        shell: bash
        run: |
          cat .bootstrap/part-*.txt | base64 --decode > /tmp/project.tar.gz
          tar -xzf /tmp/project.tar.gz -C "$GITHUB_WORKSPACE"
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-repository.yml

      - name: Commit repository baseline
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat: bootstrap engineered phase 1"
          git push origin HEAD:main
