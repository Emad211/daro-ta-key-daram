name: Flutter CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Verify committed Android platform
        run: test -f android/app/build.gradle.kts

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify current Drift schema snapshot
        run: |
          rm -rf /tmp/daro_drift_schemas
          bash tool/export_drift_schema.sh /tmp/daro_drift_schemas
          test -f drift_schemas/drift_schema_v1.json
          diff -u drift_schemas/drift_schema_v2.json /tmp/daro_drift_schemas/drift_schema_v2.json

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Capture analyzer
        id: analyze
        continue-on-error: true
        run: |
          set +e
          flutter analyze > analyzer-output.txt 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          cat analyzer-output.txt
          exit $status

      - name: Capture tests
        id: tests
        continue-on-error: true
        run: |
          set +e
          flutter test --coverage --reporter expanded > test-output.txt 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          cat test-output.txt
          exit $status

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: structured-schedule-final-diagnostics
          path: |
            analyzer-output.txt
            test-output.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce results
        if: steps.analyze.outputs.exit_code != '0' || steps.tests.outputs.exit_code != '0'
        run: exit 1

      - name: Build debug APK
        run: flutter build apk --debug
