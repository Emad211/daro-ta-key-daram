name: Feature
description: Plan a user-facing capability
title: "feat: "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List observable outcomes.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety and monetization review
      options:
        - label: Does not provide diagnosis or dosing advice
          required: true
        - label: Does not send medication data to ads or analytics
          required: true
        - label: Ad placement does not block a critical health action
          required: true
