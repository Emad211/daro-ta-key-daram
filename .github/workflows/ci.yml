name: Flutter CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/typed-write-boundaries
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Apply focused patches
        run: |
          for patch_file in \
            .step4/patches/01-add-screen.patch \
            .step4/patches/02-edit-screen.patch \
            .step4/patches/03-drift-tests.patch \
            .step4/patches/04-memory-schedule.patch
          do
            echo "Applying ${patch_file}"
            git apply --verbose "${patch_file}"
          done

      - name: Restore strict CI and remove staging files
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -rf .step4
          rm -f STEP4_PLAN.md

      - name: Install dependencies and format
        run: |
          flutter pub get
          dart format lib test

      - name: Commit finalized refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "refactor: finalize typed write boundaries"
          git push origin HEAD:agent/typed-write-boundaries
