name: daro_ta_key_daram
description: A Persian offline-first medication stock and refill reminder app.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

flutter:
  uses-material-design: true

dependencies:
  drift: 2.32.1
  drift_flutter: 0.3.0
  flutter:
    sdk: flutter
  flutter_local_notifications: 22.0.1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_timezone: 5.1.0
  go_router: ^17.3.0
  intl: ^0.20.2
  persian_datetime_picker: 3.2.0
  timezone: 0.11.1
  uuid: ^4.6.0

dev_dependencies:
  build_runner: 2.14.1
  drift_dev: 2.32.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqlite3: 3.4.0
