name: Privacy Center Patch Apply

on:
  push:
    branches:
      - agent/privacy-center-data-deletion

permissions:
  contents: write

jobs:
  apply-privacy-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/privacy-center-data-deletion
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Apply privacy-center patch
        run: python3 tool/apply_privacy_center_patch.py

      - name: Format changed Dart files
        run: |
          dart format \
            lib/app/router.dart \
            lib/features/medication_inventory/application/medication_repository.dart \
            lib/features/medication_inventory/infrastructure/drift_medication_repository.dart \
            lib/features/medication_inventory/infrastructure/in_memory_medication_repository.dart \
            lib/features/medication_inventory/presentation/providers/medication_providers.dart \
            lib/features/medication_inventory/presentation/screens/medication_list_screen.dart \
            lib/features/notifications/application/notification_sync_coordinator.dart \
            lib/features/notifications/infrastructure/notification_aware_medication_repository.dart \
            lib/features/privacy/presentation/privacy_center_screen.dart

      - name: Remove staging files
        run: |
          rm -f tool/apply_privacy_center_patch.py
          rm -f .github/workflows/privacy-apply.yml

      - name: Commit privacy-center integration
        run: |
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: integrate privacy center and data-erasure boundaries'
          git push origin HEAD:agent/privacy-center-data-deletion
