name: Flutter CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/error-recovery-flows
          fetch-depth: 0

      - name: Export source archive
        run: git archive --format=tar.gz --output=source.tar.gz HEAD

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: source.tar.gz
          if-no-files-found: error
          retention-days: 1
