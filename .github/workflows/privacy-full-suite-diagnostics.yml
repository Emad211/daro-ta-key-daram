name: Privacy Full-Suite Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  full-suite-diagnostics:
    if: github.head_ref == 'agent/privacy-center-data-deletion'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Capture complete test output
        shell: bash
        run: |
          set +e
          flutter test --coverage --reporter expanded 2>&1 | tee privacy-full-suite-output.txt
          status=${PIPESTATUS[0]}
          echo "$status" > privacy-full-suite-status.txt
          exit 0

      - name: Upload full-suite diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: privacy-full-suite-diagnostics
          path: |
            privacy-full-suite-output.txt
            privacy-full-suite-status.txt
          if-no-files-found: error
          retention-days: 1
