name: Fix AOT Size Analysis

on:
  pull_request:

permissions:
  contents: read

jobs:
  fix-aot-analysis:
    if: github.head_ref == 'agent/v1-release-candidate'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout pull-request head
        uses: actions/checkout@v4

      - name: Generate patched CI workflow
        run: |
          python3 tool/fix_aot_size_analysis.py
          cp .github/workflows/ci.yml patched-ci.yml

      - name: Upload patched CI workflow
        uses: actions/upload-artifact@v4
        with:
          name: patched-v1-ci-workflow
          path: patched-ci.yml
          if-no-files-found: error
          retention-days: 1
