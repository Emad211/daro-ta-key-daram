name: Fix AOT Size Analysis

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-aot-analysis:
    if: github.head_ref == 'agent/v1-release-candidate'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/v1-release-candidate
          fetch-depth: 0

      - name: Fix size-analysis artifact discovery
        run: python3 tool/fix_aot_size_analysis.py

      - name: Remove one-time fixer
        run: |
          rm -f tool/fix_aot_size_analysis.py
          rm -f .github/workflows/fix-aot-size-analysis.yml
          rm -f .aot-fix-trigger

      - name: Commit CI fix
        run: |
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'ci: locate Flutter AOT size reports reliably'
          git push origin HEAD:agent/v1-release-candidate
