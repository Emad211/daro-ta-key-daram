name: Flutter CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/structured-consumption-schedules
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Apply canonical formatting
        run: dart format lib test

      - name: Restore strict CI
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/ci.yml')
          text = path.read_text()
          text = text.replace(
              '          diff -ru drift_schemas /tmp/daro_drift_schemas\n',
              '          test -f drift_schemas/drift_schema_v1.json\n'
              '          diff -u drift_schemas/drift_schema_v2.json '
              '/tmp/daro_drift_schemas/drift_schema_v2.json\n',
          )
          path.write_text(text)
          PY

      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "style: apply canonical formatting"
          git push origin HEAD:agent/structured-consumption-schedules
