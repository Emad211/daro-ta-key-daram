name: Step 6 Targeted Test Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  targeted-test-diagnostics:
    if: github.head_ref == 'agent/error-recovery-flows'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Capture targeted test output
        shell: bash
        run: |
          set +e
          flutter test test/features/medication_inventory/presentation/error_recovery_widget_test.dart --reporter expanded 2>&1 | tee step6-targeted-test-output.txt
          status=${PIPESTATUS[0]}
          echo "$status" > step6-targeted-test-exit-status.txt
          exit 0

      - name: Upload targeted test diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: step6-targeted-test-diagnostics
          path: |
            step6-targeted-test-output.txt
            step6-targeted-test-exit-status.txt
          if-no-files-found: error
          retention-days: 1
