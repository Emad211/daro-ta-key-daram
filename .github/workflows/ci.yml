name: Accessibility Layout Finalizer

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize-layout:
    if: github.head_ref == 'agent/accessibility-rtl-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply measured accessibility fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path_string: str, old: str, new: str) -> None:
              path = Path(path_string)
              text = path.read_text()
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: expected block count 1, got {text.count(old)}')
              path.write_text(text.replace(old, new))

          list_path = 'lib/features/medication_inventory/presentation/screens/medication_list_screen.dart'
          replace_once(
              list_path,
              """          IconButton(
            tooltip: 'مدیریت آرشیو',
            onPressed: () => context.goNamed('archived-medications'),
            icon: const Icon(Icons.archive_outlined),
          ),
          IconButton(
            tooltip: 'فعال‌کردن یادآوری موجودی',
            onPressed: () => _requestNotificationPermission(context, ref),
            icon: const Icon(Icons.notifications_active_outlined),
          ),
""",
              """          Semantics(
            container: true,
            label: 'مدیریت آرشیو',
            button: true,
            enabled: true,
            onTap: () => context.goNamed('archived-medications'),
            excludeSemantics: true,
            child: IconButton(
              tooltip: 'مدیریت آرشیو',
              onPressed: () => context.goNamed('archived-medications'),
              icon: const Icon(Icons.archive_outlined),
            ),
          ),
          Semantics(
            container: true,
            label: 'فعال‌کردن یادآوری موجودی',
            button: true,
            enabled: true,
            onTap: () => _requestNotificationPermission(context, ref),
            excludeSemantics: true,
            child: IconButton(
              tooltip: 'فعال‌کردن یادآوری موجودی',
              onPressed: () => _requestNotificationPermission(context, ref),
              icon: const Icon(Icons.notifications_active_outlined),
            ),
          ),
""",
          )
          replace_once(
              list_path,
              """    return Row(
      mainAxisAlignment: MainAxisAlignment.center,
      children: <Widget>[
        Icon(icon, color: Theme.of(context).colorScheme.primary),
        const SizedBox(width: 10),
        Column(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: <Widget>[
            Text(
              value,
              style: Theme.of(
                context,
              ).textTheme.titleLarge?.copyWith(fontWeight: FontWeight.w900),
            ),
            Text(
              label,
              style: Theme.of(context).textTheme.labelMedium?.copyWith(
                color: Theme.of(context).colorScheme.onSurfaceVariant,
              ),
            ),
          ],
        ),
      ],
    );
""",
              """    return Column(
      mainAxisSize: MainAxisSize.min,
      children: <Widget>[
        Icon(icon, color: Theme.of(context).colorScheme.primary),
        const SizedBox(height: 6),
        Text(
          value,
          textAlign: TextAlign.center,
          style: Theme.of(
            context,
          ).textTheme.titleLarge?.copyWith(fontWeight: FontWeight.w900),
        ),
        Text(
          label,
          textAlign: TextAlign.center,
          style: Theme.of(context).textTheme.labelMedium?.copyWith(
            color: Theme.of(context).colorScheme.onSurfaceVariant,
          ),
        ),
      ],
    );
""",
          )

          card_path = 'lib/features/medication_inventory/presentation/widgets/medication_card.dart'
          replace_once(
              card_path,
              """                  Container(
                    padding: const EdgeInsets.symmetric(
                      horizontal: 10,
                      vertical: 6,
                    ),
                    decoration: BoxDecoration(
                      color: urgencyStyle.background,
                      borderRadius: BorderRadius.circular(99),
                    ),
                    child: Text(
                      snapshot.urgency.persianLabel,
                      style: Theme.of(context).textTheme.labelMedium?.copyWith(
                        color: urgencyStyle.foreground,
                        fontWeight: FontWeight.w700,
                      ),
                    ),
                  ),
                ],
              ),
""",
              """                ],
              ),
              const SizedBox(height: 10),
              Align(
                alignment: AlignmentDirectional.centerEnd,
                child: Container(
                  padding: const EdgeInsets.symmetric(
                    horizontal: 10,
                    vertical: 6,
                  ),
                  decoration: BoxDecoration(
                    color: urgencyStyle.background,
                    borderRadius: BorderRadius.circular(99),
                  ),
                  child: Text(
                    snapshot.urgency.persianLabel,
                    style: Theme.of(context).textTheme.labelMedium?.copyWith(
                      color: urgencyStyle.foreground,
                      fontWeight: FontWeight.w700,
                    ),
                  ),
                ),
              ),
""",
          )

          details_path = 'lib/features/medication_inventory/presentation/screens/medication_details_screen.dart'
          replace_once(
              details_path,
              """                IconButton(
                  tooltip: 'ویرایش مشخصات',
                  onPressed: _isArchiveBusy
                      ? null
                      : () => context.goNamed(
                          'edit-medication',
                          pathParameters: <String, String>{
                            'medicationId': medication.id,
                          },
                        ),
                  icon: const Icon(Icons.edit_outlined),
                ),
                IconButton(
                  key: Key('archive-${medication.id}'),
                  tooltip: 'آرشیو دارو',
                  onPressed: _isArchiveBusy ? null : _archive,
                  icon: _isArchiving
                      ? const SizedBox.square(
                          dimension: 20,
                          child: CircularProgressIndicator(strokeWidth: 2),
                        )
                      : const Icon(Icons.archive_outlined),
                ),
""",
              """                Semantics(
                  container: true,
                  label: 'ویرایش مشخصات',
                  button: true,
                  enabled: !_isArchiveBusy,
                  onTap: _isArchiveBusy
                      ? null
                      : () => context.goNamed(
                          'edit-medication',
                          pathParameters: <String, String>{
                            'medicationId': medication.id,
                          },
                        ),
                  excludeSemantics: true,
                  child: IconButton(
                    tooltip: 'ویرایش مشخصات',
                    onPressed: _isArchiveBusy
                        ? null
                        : () => context.goNamed(
                            'edit-medication',
                            pathParameters: <String, String>{
                              'medicationId': medication.id,
                            },
                          ),
                    icon: const Icon(Icons.edit_outlined),
                  ),
                ),
                Semantics(
                  container: true,
                  label: 'آرشیو دارو',
                  button: true,
                  enabled: !_isArchiveBusy,
                  onTap: _isArchiveBusy ? null : _archive,
                  excludeSemantics: true,
                  child: IconButton(
                    key: Key('archive-${medication.id}'),
                    tooltip: 'آرشیو دارو',
                    onPressed: _isArchiveBusy ? null : _archive,
                    icon: _isArchiving
                        ? const SizedBox.square(
                            dimension: 20,
                            child: CircularProgressIndicator(strokeWidth: 2),
                          )
                        : const Icon(Icons.archive_outlined),
                  ),
                ),
""",
          )
          replace_once(
              details_path,
              """        child: Row(
          children: <Widget>[
            Expanded(
              child: FilledButton.icon(
                onPressed: onRestock,
                icon: const Icon(Icons.add_shopping_cart_outlined),
                label: const Text('خرید مجدد'),
              ),
            ),
            const SizedBox(width: 10),
            Expanded(
              child: OutlinedButton.icon(
                onPressed: onCorrection,
                icon: const Icon(Icons.edit_note_outlined),
                label: const Text('اصلاح موجودی'),
              ),
            ),
          ],
        ),
""",
              """        child: Column(
          crossAxisAlignment: CrossAxisAlignment.stretch,
          children: <Widget>[
            FilledButton.icon(
              onPressed: onRestock,
              icon: const Icon(Icons.add_shopping_cart_outlined),
              label: const Text('خرید مجدد'),
            ),
            const SizedBox(height: 10),
            OutlinedButton.icon(
              onPressed: onCorrection,
              icon: const Icon(Icons.edit_note_outlined),
              label: const Text('اصلاح موجودی'),
            ),
          ],
        ),
""",
          )

          archive_path = 'lib/features/medication_inventory/presentation/screens/archived_medications_screen.dart'
          replace_once(
              archive_path,
              """                IconButton.filledTonal(
                  key: Key('delete-${medication.id}'),
                  tooltip: 'حذف دائمی',
                  onPressed: isBusy ? null : onDelete,
                  icon: const Icon(Icons.delete_forever_outlined),
                ),
""",
              """                Semantics(
                  container: true,
                  label: 'حذف دائمی',
                  button: true,
                  enabled: !isBusy,
                  onTap: isBusy ? null : onDelete,
                  excludeSemantics: true,
                  child: IconButton.filledTonal(
                    key: Key('delete-${medication.id}'),
                    tooltip: 'حذف دائمی',
                    onPressed: isBusy ? null : onDelete,
                    icon: const Icon(Icons.delete_forever_outlined),
                  ),
                ),
""",
          )
          PY

      - name: Set up Flutter formatter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Format changed Dart files
        run: |
          dart format \
            lib/features/medication_inventory/presentation/screens/medication_list_screen.dart \
            lib/features/medication_inventory/presentation/widgets/medication_card.dart \
            lib/features/medication_inventory/presentation/screens/medication_details_screen.dart \
            lib/features/medication_inventory/presentation/screens/archived_medications_screen.dart

      - name: Restore strict CI
        run: |
          cat > .github/workflows/ci.yml <<'YAML'
          name: Flutter CI

          on:
            push:
              branches: [main]
            pull_request:

          permissions:
            contents: read

          jobs:
            validate:
              runs-on: ubuntu-latest
              timeout-minutes: 35

              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Set up Flutter
                  uses: subosito/flutter-action@v2
                  with:
                    flutter-version: 3.44.6
                    channel: stable
                    cache: true

                - name: Verify committed Android platform
                  run: test -f android/app/build.gradle.kts

                - name: Install dependencies
                  run: flutter pub get

                - name: Generate Drift code
                  run: dart run build_runner build --delete-conflicting-outputs

                - name: Verify Drift schema snapshot
                  run: |
                    rm -rf /tmp/daro_drift_schemas
                    bash tool/export_drift_schema.sh /tmp/daro_drift_schemas
                    test -f drift_schemas/drift_schema_v1.json
                    diff -u drift_schemas/drift_schema_v2.json /tmp/daro_drift_schemas/drift_schema_v2.json

                - name: Verify formatting
                  run: dart format --output=none --set-exit-if-changed lib test

                - name: Analyze
                  run: flutter analyze

                - name: Test
                  run: flutter test --coverage

                - name: Build debug APK
                  run: flutter build apk --debug

                - name: Upload debug APK
                  uses: actions/upload-artifact@v4
                  with:
                    name: daro-ta-key-debug-apk
                    path: build/app/outputs/flutter-apk/app-debug.apk
                    if-no-files-found: error
                    retention-days: 7
          YAML

      - name: Commit measured accessibility fixes
        run: |
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: adapt medication surfaces for large text'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
