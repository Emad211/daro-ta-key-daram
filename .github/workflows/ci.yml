name: Lifecycle Widget Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  lifecycle-widget-diagnostics:
    if: github.head_ref == 'agent/accessibility-rtl-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Capture lifecycle widget output
        shell: bash
        run: |
          set +e
          flutter test test/features/medication_inventory/presentation/medication_lifecycle_widget_test.dart --reporter expanded 2>&1 | tee lifecycle-widget-output.txt
          status=${PIPESTATUS[0]}
          echo "$status" > lifecycle-widget-status.txt
          exit 0

      - name: Upload lifecycle diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-widget-diagnostics
          path: |
            lifecycle-widget-output.txt
            lifecycle-widget-status.txt
          if-no-files-found: error
          retention-days: 1
