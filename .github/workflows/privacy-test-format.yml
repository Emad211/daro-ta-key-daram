name: Privacy Test Format Apply

on:
  push:
    branches:
      - agent/privacy-center-data-deletion

permissions:
  contents: write

jobs:
  format-privacy-tests:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/privacy-center-data-deletion
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Apply canonical formatting
        run: |
          dart format \
            test/features/medication_inventory/presentation/accessibility_rtl_widget_test.dart \
            test/features/notifications/infrastructure/notification_aware_delete_all_test.dart

      - name: Remove temporary formatter
        run: rm -f .github/workflows/privacy-test-format.yml

      - name: Commit formatted tests
        run: |
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style: format final privacy-center tests'
          git push origin HEAD:agent/privacy-center-data-deletion
