name: Flutter CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose-patches:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/lifecycle-state-machine
          fetch-depth: 0

      - name: Check SQLite lifecycle patch
        run: git apply --check --verbose .step5/01-drift-lifecycle.patch

      - name: Check archived edit guard
        if: always()
        run: git apply --check --verbose .step5/02-edit-guard.patch

      - name: Check archived details guard
        if: always()
        run: git apply --check --verbose .step5/03-details-guard.patch
