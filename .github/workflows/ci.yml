name: Flutter CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Install dependencies and generate code
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Verify schema and formatting
        run: |
          rm -rf /tmp/daro_drift_schemas
          bash tool/export_drift_schema.sh /tmp/daro_drift_schemas
          test -f drift_schemas/drift_schema_v1.json
          diff -u drift_schemas/drift_schema_v2.json /tmp/daro_drift_schemas/drift_schema_v2.json
          dart format --output=none --set-exit-if-changed lib test

      - name: Capture analyzer
        id: analyze
        continue-on-error: true
        run: |
          set +e
          flutter analyze > analyzer-output.txt 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          cat analyzer-output.txt
          exit $status

      - name: Upload analyzer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step4-analyzer-diagnostics
          path: analyzer-output.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce analyzer
        if: steps.analyze.outputs.exit_code != '0'
        run: exit 1
